<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Calendário Perpétuo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style type="text/css">
        body {
            font-family: Verdana, Geneva, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            text-align: center;
            color: #333;
        }

        .tabela-mestra {
            width: 100%;
            max-width: 770px;
            margin: 0 auto;
        }

        .img-header {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Estilo do Calendário Gerado */
        #Calendrier table {
            width: auto;
            border-collapse: collapse;
            background-color: #F5F5F5;
            margin: 20px auto;
            border: 1px solid #999999;
        }

        #Calendrier td {
            border: 1px solid #cccccc;
            padding: 8px;
            font-size: 12px;
        }

        /* Botões e Selects */
        select, input[type="button"] {
            font-family: Verdana;
            font-size: 14px;
            padding: 8px;
            margin: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .TITRE {
            font-size: 16px;
            background-color: #eee;
            padding: 10px !important;
        }

        /* --- AJUSTES PARA CELULAR --- */
        @media screen and (max-width: 600px) {
            body { padding: 10px; }

            #Calendrier table {
                width: 100% !important;
                font-size: 16px !important;
            }

            #Calendrier td {
                padding: 12px 2px !important;
            }

            select {
                width: 45%;
                font-size: 16px !important;
            }

            input[type="button"] {
                width: 100%;
                padding: 15px !important;
                font-size: 18px !important;
                background-color: #f0f0f0;
                cursor: pointer;
            }
        }
    </style>

    <script language="JavaScript">
        var HTMLCode = "";
        // Corrigido acentos nos arrays
        var DaysList = new Array("Jour_Vide", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb", "Dom");
        var MonthsList = new Array("Mois_Vide", "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro");
        var MonthLength = new Array(0, 31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31);

        var Today = new Date();
        var TodaysYear = Today.getFullYear();
        var TodaysMonth = Today.getMonth() + 1;
        var TodaysDate = Today.getDate();

        function CheckLeap(yy) {
            return ((yy % 100 != 0 && yy % 4 == 0) || (yy % 400 == 0)) ? 29 : 28;
        }

        function Date2Days(yy, mm, dd) {
            if (mm > 2) {
                var bis = Math.floor(yy / 4) - Math.floor(yy / 100) + Math.floor(yy / 400);
                return Math.floor(yy * 365 + bis) + (mm - 1) * 31 - Math.floor(mm * 0.4 + 2.3) + dd;
            } else {
                var bis = Math.floor((yy - 1) / 4) - Math.floor((yy - 1) / 100) + Math.floor((yy - 1) / 400);
                return Math.floor(yy * 365 + bis) + (mm - 1) * 31 + dd;
            }
        }

        function DefDateDay(yy, mm, dd) {
            return Math.floor((Date2Days(yy, mm, dd) - 2) % 7) + 1;
        }

        function DefWeekNum(yy, mm, dd) {
            var numd = 0;
            for (var n = 1; n < mm; n++) { numd += MonthLength[n]; }
            numd = numd + dd - (9 - DefDateDay(yy, 1, 1));
            var numw = Math.floor(numd / 7) + 1;
            if (DefDateDay(yy, 1, 1) == 1) { numw++; }
            return numw;
        }

        function CheckData() {
            var qDate = document.Cal.Date.selectedIndex + 1;
            var qMonth = document.Cal.Month.selectedIndex + 1;
            var qYear = (document.Cal.Century.selectedIndex + 15) * 100 + document.Cal.Year.selectedIndex;
            MonthLength[2] = CheckLeap(qYear);

            if ((qYear * 10000 + qMonth * 100 + qDate) < 15821220) {
                alert("Data inválida para o calendário gregoriano.");
            } else if (MonthLength[qMonth] < qDate) {
                alert("Este mês não possui " + qDate + " dias.");
            } else {
                DisplaySchedule(qDate, qMonth, qYear);
            }
        }

        function DisplaySchedule(qDate, qMonth, qYear) {
            var qDay = DefDateDay(qYear, qMonth, qDate);
            var weekOne = DefWeekNum(qYear, qMonth, 1);
            var weekRef = DefWeekNum(qYear, qMonth, qDate);

            HTMLCode = "<table cellspacing=0 cellpadding=3 border=1>";
            HTMLCode += "<tr align=center><td colspan=8 class='TITRE'><b>" + MonthsList[qMonth] + " " + qYear + "</b></td></tr><tr align=center>";

            for (var s = 1; s < 8; s++) {
                var color = (qDay == s) ? "#ff0000" : "#333";
                HTMLCode += "<td><b><font color='" + color + "'>" + DaysList[s] + "</font></b></td>";
            }
            HTMLCode += "<td><b><font color=#888888>Sem</font></b></td></tr>";
            
            var rowCount = 0;
            for (var i = (1 - DefDateDay(qYear, qMonth, 1)); i < MonthLength[qMonth]; i++) {
                HTMLCode += "<tr align=center>";
                for (var j = 1; j < 8; j++) {
                    var dayVal = i + j;
                    if (dayVal <= 0 || dayVal > MonthLength[qMonth]) {
                        HTMLCode += "<td>&nbsp;</td>";
                    } else if (dayVal == qDate) {
                        HTMLCode += "<td><b><font color=#ff0000>" + dayVal + "</font></b></td>";
                    } else {
                        HTMLCode += "<td>" + dayVal + "</td>";
                    }
                }
                HTMLCode += "<td><font color=#888888>" + (weekOne + rowCount) + "</font></td></tr>";
                rowCount++;
                i = i + 6;
            }
            document.getElementById('Calendrier').innerHTML = HTMLCode + "</table>";
        }
    </script>
</head>

<body onload="CheckData()">

    <table class="tabela-mestra" border="0" cellpadding="0" cellspacing="0">
        <tr>
            <td style="padding: 10px 0;">
                <!-- <img src="imagens/calendario.png" class="img-header" alt="Jairo - Calendário Perpétuo"> -->
            </td>
        </tr>
    </table>

    <h2 style="font-size: 1.2rem; margin: 10px 0;">Jairo - Calendário Perpétuo</h2>
	<h5 style="font-style: italic; color: blue;">Porque pela graça sois salvos, mediante a fé; e isto não vem de vós; <br> é dom de Deus; não de obras, para que ninguém se glorie. <br> Efésios 2:8-9</h5>

    <form name="Cal">
        <div style="margin-bottom: 15px;">
            <script>
                document.write("<select name='Date'>");
                for (var d=1; d<32; d++) document.write("<option" + (d == TodaysDate ? " SELECTED" : "") + ">" + (d < 10 ? "0"+d : d) + "</option>");
                document.write("</select>");

                document.write("<select name='Month'>");
                for (var m=1; m<13; m++) document.write("<option" + (m == TodaysMonth ? " SELECTED" : "") + ">" + MonthsList[m] + "</option>");
                document.write("</select>");

                document.write("<select name='Century'>");
                for (var c=15; c<25; c++) document.write("<option" + (c == Math.floor(TodaysYear / 100) ? " SELECTED" : "") + ">" + c + "</option>");
                document.write("</select>");

                document.write("<select name='Year'>");
                for (var y=0; y<100; y++) document.write("<option" + (y == (TodaysYear % 100) ? " SELECTED" : "") + ">" + (y < 10 ? "0"+y : y) + "</option>");
                document.write("</select>");
            </script>
            <input type="button" value="OK" onclick="CheckData()" style="font-weight: bold;">
        </div>

        <input type="button" value="Ver a data atual" onclick="document.Cal.reset(); CheckData();">
        
        <div id="Calendrier"></div>
    </form>

</body>
</html>
